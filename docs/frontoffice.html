<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>차세대학습플랫폼 – 통합교육이력관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (!sessionStorage.getItem('loggedInUser')) {
      window.location.href = 'index.html';
    }
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#002C5F', accent: '#007AFF' },
          fontFamily: { sans: ['Pretendard', 'Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="min-h-screen">

  <!-- GNB -->
  <header id="gnb" class="bg-brand text-white sticky top-0 z-50 shadow-lg"></header>

  <!-- MAIN CONTENT -->
  <main class="p-8 pr-64">
    <div id="page-dashboard" class="page active fade-in"></div>
    <div id="page-plans" class="page fade-in"></div>
    <div id="page-history" class="page fade-in"></div>
    <div id="page-apply" class="page fade-in"></div>
    <div id="page-budget" class="page fade-in"></div>
    <div id="page-mypage" class="page fade-in"></div>
    <div id="page-fo-manual" class="page fade-in"></div>
    <div id="page-approval-member" class="page fade-in"></div>
    <div id="page-approval-leader" class="page fade-in"></div>
  </main>

  <!-- FLOATING BUDGET WIDGET -->
  <div id="floating-budget" class="floating-budget"></div>

  <!-- Supabase SDK (FO에서도 DB 정책 로드를 위해 필수) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase_client.js"></script>

  <!-- JS: 순서 중요 (data → utils → 각 기능 모듈 → main) -->
  <script src="js/bo_data.js?v=24"></script>
  <script src="js/data.js"></script>
  <script src="js/fo_persona_loader.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/fo_form_loader.js"></script>
  <script src="js/gnb.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/approval_stepper.js?v=1"></script>
  <script src="js/plans.js?v=3"></script>
  <script src="js/history.js"></script>
  <script src="js/apply.js"></script>
  <script src="js/budget.js"></script>
  <script src="js/mypage.js"></script>
  <script src="js/fo_manual.js"></script>
  <script src="js/approval.js"></script>
  <script src="js/main.js"></script>

</body>

</html>
