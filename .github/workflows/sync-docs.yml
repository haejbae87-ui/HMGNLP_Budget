name: Sync public → docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'public/**'

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync public/ to docs/
        run: |
          rm -rf docs
          cp -r public docs

      - name: Commit & push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: sync docs from public [skip ci]"
          git push
