name: Sync public → docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'public/**'

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync public/ to docs/
        run: |
          # docs/ 내부에서 public/ 외에 독립 관리되는 폴더 백업
          for dir in PRD TASKS; do
            if [ -d "docs/$dir" ]; then
              cp -r "docs/$dir" "/tmp/_${dir}_backup"
            fi
          done

          rm -rf docs
          cp -r public docs

          # 백업된 독립 폴더 복원
          for dir in PRD TASKS; do
            if [ -d "/tmp/_${dir}_backup" ]; then
              cp -r "/tmp/_${dir}_backup" "docs/$dir"
              rm -rf "/tmp/_${dir}_backup"
            fi
          done

      - name: Commit & push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: sync docs from public"
          git push
