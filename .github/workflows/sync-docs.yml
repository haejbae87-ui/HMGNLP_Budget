name: Sync public → docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'public/**'

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync public/ to docs/
        run: |
          # PRD 폴더 보존 (public/ 외부 독립 관리)
          if [ -d docs/PRD ]; then
            cp -r docs/PRD /tmp/_prd_backup
          fi
          rm -rf docs
          cp -r public docs
          # PRD 복원
          if [ -d /tmp/_prd_backup ]; then
            cp -r /tmp/_prd_backup docs/PRD
            rm -rf /tmp/_prd_backup
          fi

      - name: Commit & push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: sync docs from public [skip ci]"
          git push
